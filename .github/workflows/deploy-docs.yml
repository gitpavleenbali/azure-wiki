name: Deploy Azure Wiki to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: _website
        run: npm install

      - name: Build site
        working-directory: _website
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Verify knowledge base
        working-directory: _website
        run: |
          echo "=== Verifying Flashcard & Quiz Knowledge Base ==="
          node -e "
            const kb = require('./src/data/knowledgeBase.json');
            const modules = Object.keys(kb);
            let totalCards = 0, totalQuiz = 0, issues = [];
            modules.forEach(m => {
              const fc = kb[m].flashcards?.length || 0;
              const qz = kb[m].quiz?.length || 0;
              totalCards += fc;
              totalQuiz += qz;
              console.log('  ' + m + ': ' + fc + ' flashcards, ' + qz + ' quiz questions');
              if (fc === 0) issues.push(m + ' has no flashcards');
              if (qz === 0) issues.push(m + ' has no quiz questions');
            });
            console.log('');
            console.log('Total: ' + totalCards + ' flashcards, ' + totalQuiz + ' quiz questions across ' + modules.length + ' modules');
            if (issues.length > 0) {
              console.log('');
              console.log('⚠ Warnings:');
              issues.forEach(i => console.log('  - ' + i));
            }
            console.log('');
            console.log('✅ Knowledge base verification complete');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
